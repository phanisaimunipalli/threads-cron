name: Post to Threads 3x Daily

on:
  schedule:
    - cron: "30 15 * * *"   # 7:30 AM PST
    - cron: "30 20 * * *"   # 12:30 PM PST
    - cron: "30 2 * * *"    # 6:30 PM PST
  workflow_dispatch:         # manual trigger anytime

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Threads post
        run: |
          curl -s -X GET "${{ secrets.VERCEL_POST_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            | jq .
